name: Liam — Research

on:
  workflow_dispatch:
  push:
    paths:
      - data/pipeline_state.json

jobs:
  research:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check pipeline state
        id: state
        run: |
          STATE=$(cat data/pipeline_state.json | tr -d '"')
          echo "state=$STATE" >> $GITHUB_OUTPUT

      - name: Skip if not idle
        if: steps.state.outputs.state != 'idle'
        run: |
          echo "Pipeline state is '${{ steps.state.outputs.state }}' — skipping Liam."
          exit 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Liam Research
        env:
          AI_API_KEY:            ${{ secrets.AI_API_KEY }}
          NVIDIA_API_KEY:        ${{ secrets.NVIDIA_API_KEY }}
          GITHUB_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME:       ${{ secrets.GH_USERNAME }}
          DISCORD_BOT_TOKEN:     ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_APPROVAL_CHANNEL_ID: ${{ secrets.DISCORD_APPROVAL_CHANNEL_ID }}
          DISCORD_OWNER_USER_ID: ${{ secrets.DISCORD_OWNER_USER_ID }}
        run: python agents/liam/scout.py

      - name: Commit research results
        run: |
          git config --global user.name  "Liam Bot"
          git config --global user.email "liam@ai-factory.bot"
          git add data/
          git diff --cached --quiet || git commit -m "🔍 Liam: research cycle [skip ci]"
          git push
