name: Nick — Marketing

on:
  push:
    paths:
      - data/app_database.json
  workflow_dispatch:

concurrency:
  group: nick-marketing
  cancel-in-progress: false

jobs:
  content:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Nick Marketing Agent
        env:
          AI_API_KEY:            ${{ secrets.AI_API_KEY }}
          NVIDIA_API_KEY:        ${{ secrets.NVIDIA_API_KEY }}
          GITHUB_USERNAME:       ${{ secrets.GH_USERNAME }}
          FACTORY_REPO_NAME:     ${{ secrets.FACTORY_REPO_NAME }}

          POSTIZ_API_KEY:        ${{ secrets.POSTIZ_API_KEY }}
          POSTIZ_BASE_URL:       ${{ secrets.POSTIZ_BASE_URL }}

          DISCORD_BOT_TOKEN:     ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_APPROVAL_CHANNEL_ID: ${{ secrets.DISCORD_APPROVAL_CHANNEL_ID }}
          DISCORD_OWNER_USER_ID: ${{ secrets.DISCORD_OWNER_USER_ID }}

        run: python agents/nick/marketer.py

      - name: Commit marketing files
        run: |
          git config --global user.name  "Nick Bot"
          git config --global user.email "nick@ai-factory.bot"

          git add marketing/ data/

          git diff --cached --quiet || git commit -m "✍️ Nick: marketing generated [skip ci]"
          git push
