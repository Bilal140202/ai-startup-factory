name: Kyle — Builder

on:
  push:
    paths:
      - data/problems.json
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt
      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Run Kyle
        env:
          AI_API_KEY:          ${{ secrets.AI_API_KEY }}
          NVIDIA_API_KEY:      ${{ secrets.NVIDIA_API_KEY }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME:     ${{ secrets.GITHUB_USERNAME }}
          NETLIFY_AUTH_TOKEN:  ${{ secrets.NETLIFY_AUTH_TOKEN }}
          DISCORD_BOT_TOKEN:   ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_APPROVAL_CHANNEL_ID: ${{ secrets.DISCORD_APPROVAL_CHANNEL_ID }}
          DISCORD_OWNER_USER_ID:       ${{ secrets.DISCORD_OWNER_USER_ID }}
        run: python agents/kyle/builder.py

      - name: Commit
        run: |
          git config --global user.name  "Kyle Bot"
          git config --global user.email "kyle@ai-factory.bot"
          git add generated/ data/
          git diff --cached --quiet || git commit -m "🔨 Kyle: app built [skip ci]"
          git push

